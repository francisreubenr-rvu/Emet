name: Deploy frontend to GitHub Pages

# Publishes a STATIC EXPORT of the Next.js console UI. GitHub Pages cannot run
# the FastAPI backend, Redis, or scanners, so the deployed site is a front-end
# preview; live data requires a running backend (see README).

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_OUTPUT_EXPORT: "true"
      NEXT_BASE_PATH: "/Emet"
      NEXT_PUBLIC_STATIC_DEMO: "true"
      NEXT_PUBLIC_API_URL: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      # Next 16 emits App Router segment-prefetch payloads whose names contain
      # ".." (e.g. __next..__full.txt). The GitHub Pages artifact extractor
      # rejects "*.." paths as traversal and the deploy hangs. These files only
      # power soft-navigation prefetch; every route keeps its own index.html, so
      # removing them leaves the site fully functional (nav falls back to full
      # page loads).
      - name: Strip prefetch payloads with unsafe names
        run: |
          find out -type f -name '*..*' -delete
          echo "Remaining unsafe-named files: $(find out -name '*..*' | wc -l)"

      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
